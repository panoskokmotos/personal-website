<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found · Panos Kokmotos</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/jpeg" href="photo.jpg" />
  <style>
    .notfound-wrap {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px 20px;
    }
    .notfound-code {
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 900;
      background: linear-gradient(135deg, #3b6ef8, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }
    .notfound-emoji { font-size: 3rem; margin-bottom: 16px; display: block; }
    .notfound-wrap h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800; color: var(--navy); margin-bottom: 12px;
    }
    .notfound-wrap p {
      font-size: 1rem; color: var(--text-muted);
      max-width: 460px; margin: 0 auto 32px;
      line-height: 1.7;
    }
    .notfound-actions {
      display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
    }
  </style>
</head>
<body>
  <div class="notfound-wrap">
    <div class="notfound-code">404</div>
    <span class="notfound-emoji">🗺️</span>
    <h1>This page doesn't exist</h1>
    <p>Looks like you wandered off the map. No worries — even the best explorers take a wrong turn sometimes.</p>
    <div class="notfound-actions">
      <a href="/" class="btn btn-primary">← Back to Home</a>
      <a href="mailto:panagiotis.kokmotoss@gmail.com" class="btn btn-ghost">Contact Panos</a>
    </div>
  </div>
</body>
</html>
